<!DOCTYPE html>
<html>
<head>
  <title>My Checkpoint Page</title>

  <link rel="stylesheet" href="look.css">

  <!-- TASK 2 EXPLANATION:
       The stylesheet goes in the head so styles load before the page displays, preventing unstyled content.
  -->
</head>

<body>

  <!-- TASK 3 -->

  <h1>My Checkpoint Page</h1>

  <p id="intro">
    This is my intro paragraph. It contains at least two sentences.
    It demonstrates how HTML elements work with IDs.
  </p>

  <h2 id="section-title">My Section Title</h2>

  <ul>
    <li class="highlight">Item 1</li>
    <li>Item 2</li>
    <li class="highlight">Item 3</li>
    <li>Item 4</li>
  </ul>

  <!-- TASK 3 EXPLANATION:

 No, eleents cannot share the same id

  <div id="box">
    This is a simple box container.
  </div>

  <button id="click-me">Click Me</button>
